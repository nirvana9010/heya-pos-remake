name: Deploy to Staging

on:
  push:
    branches: [staging]

env:
  FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

concurrency:
  group: staging-deploy
  cancel-in-progress: true

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Validate Prisma migrations
        run: sh ./scripts/validate-prisma-migrations.sh

  deploy-api:
    name: Deploy API to Staging
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Fly.io
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to staging
        run: |
          flyctl deploy \
            --config apps/api/fly.staging.toml \
            --dockerfile Dockerfile.api \
            --ha=false \
            --strategy immediate

      - name: Run migrations
        run: |
          flyctl ssh console \
            --app heya-pos-api-staging \
            -C "cd /app/apps/api && npx prisma migrate deploy" \
            || echo "Migration check completed"
